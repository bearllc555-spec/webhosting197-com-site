// Bulletproof placeholder hide on focus â clear the placeholder attribute
// outright on focus, restore it on blur. The CSS-only approach
// (.composer-input:focus::placeholder { color: white }) doesn't render
// reliably in some browsers; this guarantees the gray hint vanishes the
// instant the customer clicks into the textarea.
$input.addEventListener("focus", () => {
  if (!$input.dataset.savedPlaceholder) {
    $input.dataset.savedPlaceholder = $input.placeholder || "";
    $input.placeholder = "";
  }
});
$input.addEventListener("blur", () => {
  if ($input.dataset.savedPlaceholder !== undefined) {
    $input.placeholder = $input.dataset.savedPlaceholder;
    delete $input.dataset.savedPlaceholder;
  }
});

/* ---------- helpers ---------- */

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function relativeTime(ts) {
  const diffMs = Date.now() - ts;
  const sec = Math.round(diffMs / 1000);
  const min = Math.round(sec / 60);
  const hr = Math.round(min / 60);
  const day = Math.round(hr / 24);
  if (sec < 30) return "just now";
  if (min < 1) return `${sec}s ago`;
  if (min < 60) return `${min} min ago`;
  if (hr < 24) return `${hr} hour${hr > 1 ? "s" : ""} ago`;
  return `${day} day${day > 1 ? "s" : ""} ago`;
}

/* ---------- save-status truth state ----------
 *
 * Three states map to two visual representations:
 *   - "saved" (no local diffs):           green dot + "Saved"
 *   - "local" (localStorage has diffs):   amber dot + "Local changes â not yet published"
 *   - "transient" (just-applied toast):   amber dot + "<short toast>" for 3.5s, then re-derive
 *
 * Step 5 will add a real "published" state once KV-backed /api/apply is wired.
 */
const $saveStatus = document.getElementById("saveStatus");
let saveStatusTimeout = null;

function updateSaveStatus() {
  const stack = loadDiffStack();
  if (stack.length > 0) {
    $saveStatus.classList.add("local");
    $saveStatusText.textContent = "Local changes â not yet published";
  } else {
    $saveStatus.classList.remove("local");
    $saveStatusText.textContent = "Saved";
  }
}

function flashSaveStatus(msg) {
  // Show a short toast, keep amber dot if we have local changes,
  // then re-derive the steady-state text after 3.5s.
  $saveStatusText.textContent = msg;
  if (loadDiffStack().length > 0) {
    $saveStatus.classList.add("local");
  }
  clearTimeout(saveStatusTimeout);
  saveStatusTimeout = setTimeout(updateSaveStatus, 3500);
}

/* ---------- diff persistence + iframe replay (Step 1, B03 phase A) ----------
 *
 * Apply mutates the iframe DOM in-memory (patchIframePreview). That mutation
 * dies on iframe reload because the preview is a static file. To make
 * Apply persist across refresh, we also push every applied diff op onto a
 * localStorage stack scoped to this customer. On every iframe load we replay
 * the stack against the freshly-rendered DOM, restoring all prior changes.
 *
 * Step 5 will replace this with a KV-backed /api/apply Function that re-renders
 * the preview server-side. Until then, the localStorage layer is the source
 * of truth for "what's locally changed" â it powers the topbar truth-state and
 * survives refresh.
 *
 * Storage key: "press:<customer-slug>:diffs"  (scoped per customer)
 * Storage shape: JSON array of diff ops, in order applied
 */

const DIFF_STORAGE_KEY = "press:" + (currentSite?.meta?.customer_slug || "default") + ":diffs";

function loadDiffStack() {
  try {
    const raw = localStorage.getItem(DIFF_STORAGE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function pushDiffOps(ops) {
  if (!Array.isArray(ops) || ops.length === 0) return;
  const stack = loadDiffStack();
  ops.forEach((op) => stack.push(op));
  try { localStorage.setItem(DIFF_STORAGE_KEY, JSON.stringify(stack)); } catch (e) { console.warn("localStorage push failed:", e); }
}

function clearDiffStack() {
  try { localStorage.removeItem(DIFF_STORAGE_KEY); } catch {}
}

// Replay every stored diff op against the iframe DOM. Called after iframe load.
// Skips ops we don't know how to render (logged to console, not a hard error).
function replayDiffsInIframe() {
  const stack = loadDiffStack();
  if (stack.length === 0) return;
  const doc = $iframe.contentDocument;
  if (!doc || !doc.body) return;
  stack.forEach((op) => {
    try { applyOpToIframe(doc, op); }
    catch (e) { console.warn("Replay skipped op:", op, e); }
  });
}

function applyOpToIframe(doc, op) {
  if (op.op !== "set") return; // V1: only set is supported for replay; insert/remove/move are deferred
  const path = op.path;
  const value = op.value;

  // Brand colors â CSS variables on iframe :root
  if (path === "brand.colors.primary")     { doc.documentElement.style.setProperty("--primary", value); return; }
  if (path === "brand.colors.accent")      { doc.documentElement.style.setProperty("--accent", value); return; }
  if (path === "brand.colors.neutral_dark"){ doc.documentElement.style.setProperty("--neutral-dark", value); return; }
  if (path === "brand.colors.neutral_light"){doc.documentElement.style.setProperty("--neutral-light", value); return;}

  // Business name â header logo + footer brand
  if (path === "business.name") {
    doc.querySelectorAll(".brand-logo").forEach((el) => { el.textContent = value; });
    doc.querySelectorAll(".footer-brand").forEach((el) => { el.textContent = value; });
    return;
  }

  // Business tagline â footer-tagline element (if present)
  if (path === "business.tagline") {
    doc.querySelectorAll(".footer-tagline").forEach((el) => { el.textContent = value; });
    return;
  }

  // Business address â footer-address element (if present)
  if (path === "business.contact.address") {
    doc.querySelectorAll(".footer-address, .footer-link.footer-address").forEach((el) => { el.textContent = value; });
    return;
  }

  // Phone number â all phone buttons + footer tel: link
  if (path === "business.contact.phone") {
    const telHref = "tel:" + String(value).replace(/[^\d+]/g, "");
    // Buttons that show "Call (NNN) NNN-NNNN" â replace the phone fragment in textContent
    doc.querySelectorAll(".nav-cta, .hero-cta, .cta-btn").forEach((el) => {
      const phoneRegex = /\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4}/;
      // Walk text nodes so we don't blow away child SVG arrows
      el.childNodes.forEach((n) => {
        if (n.nodeType === 3 && phoneRegex.test(n.nodeValue)) {
          n.nodeValue = n.nodeValue.replace(phoneRegex, value);
        }
      });
      if (el.tagName === "A") el.setAttribute("href", telHref);
    });
    doc.querySelectorAll(".footer-link[href^='tel:']").forEach((el) => {
      el.textContent = value;
      el.setAttribute("href", telHref);
    });
    return;
  }

  // sections[N].props.<field> â tagged-section descendants
  const sectionMatch = path.match(/^sections\[(\d+)\]\.props\.([\w_]+)$/);
  if (sectionMatch) {
    const idx = parseInt(sectionMatch[1], 10);
    const prop = sectionMatch[2];
    const section = doc.querySelector('[data-press-section="' + idx + '"]');
    if (!section) return;
    if (prop === "headline")    { const el = section.querySelector("h1"); if (el) el.textContent = value; return; }
    if (prop === "subheadline") { const el = section.querySelector(".lead.hero-sub, .hero-sub, .lead"); if (el) el.textContent = value; return; }
    if (prop === "heading")     { const el = section.querySelector("h2"); if (el) el.textContent = value; return; }
    if (prop === "subheading")  { const el = section.querySelector(".cta-sub, .lead.cta-sub"); if (el) el.textContent = value; return; }
    if (prop === "cta_label")   {
      const btn = section.querySelector(".btn, .hero-cta, .cta-btn, .nav-cta");
      if (btn) {
        // Preserve any SVG icon inside the button
        const svg = btn.querySelector("svg");
        const txt = btn.firstChild;
        if (txt && txt.nodeType === 3) txt.nodeValue = value + " ";
        else { btn.insertBefore(doc.createTextNode(value + " "), btn.firstChild); }
        if (svg && !btn.contains(svg)) btn.appendChild(svg);
      }
      return;
    }
    if (prop === "cta_href") {
      const btn = section.querySelector("a.btn, a.hero-cta, a.cta-btn, a.nav-cta");
      if (btn) btn.setAttribute("href", value);
      return;
    }
  }

  // Testimonials nested inside a section â sections[N].props.testimonials[M].<field>
  const testMatch = path.match(/^sections\[(\d+)\]\.props\.testimonials\[(\d+)\]\.([\w_]+)$/);
  if (testMatch) {
    const sidx = parseInt(testMatch[1], 10);
    const tidx = parseInt(testMatch[2], 10);
    const prop = testMatch[3];
    const section = doc.querySelector('[data-press-section="' + sidx + '"]');
    if (!section) return;
    const cards = section.querySelectorAll(".testimonial-card");
    const card = cards[tidx];
    if (!card) return;
    if (prop === "quote")  { const el = card.querySelector(".quote, blockquote, p:not(.author):not(.role)"); if (el) el.textContent = value; return; }
    if (prop === "author") { const el = card.querySelector(".author"); if (el) el.textContent = value; return; }
    if (prop === "role")   { const el = card.querySelector(".role"); if (el) el.textContent = value; return; }
  }

  // Top-level services[N].<field> â service-card descendants
  const serviceMatch = path.match(/^services\[(\d+)\]\.([\w_]+)$/);
  if (serviceMatch) {
    const idx = parseInt(serviceMatch[1], 10);
    const prop = serviceMatch[2];
    const cards = doc.querySelectorAll(".service-card");
    const card = cards[idx];
    if (!card) return;
    if (prop === "name")        { const el = card.querySelector("h3, h4, .service-title"); if (el) el.textContent = value; return; }
    if (prop === "description") { const el = card.querySelector("p, .service-desc"); if (el) el.textContent = value; return; }
  }
}

/* ---------- preview chrome navigation (back/forward/reload) ---------- */

const $navBack = document.getElementById("navBack");
const $navForward = document.getElementById("navForward");
const $navReload = document.getElementById("navReload");
const INITIAL_IFRAME_SRC = $iframe.getAttribute("src");

$navBack.addEventListener("click", () => {
  try { $iframe.contentWindow.history.back(); } catch (e) { $iframe.src = INITIAL_IFRAME_SRC; }
});
$navForward.addEventListener("click", () => {
  try { $iframe.contentWindow.history.forward(); } catch (e) { /* noop */ }
});
$navReload.addEventListener("click", () => {
  // Always go back to the original Jack's Plumbing preview â protects the
  // user when a stray click navigated the iframe away.
  $iframe.src = INITIAL_IFRAME_SRC;
});

/* ---------- section + sub-section targeting (hover, click, drill-down) ----------
 *
 * Two levels of targeting:
 *   - Level 1 (parent section): green hover + selected. Click any section in
 *     the iframe â pill says "Editing: <label>". Sets selectedTarget.
 *   - Level 2 (sub-element inside a selected parent): amber hover + selected.
 *     Click sub-element AFTER parent is selected â pill says "Editing:
 *     <child label>". Parent stays in faded green. Sets selectedSubTarget.
 *
 * Click outside any section clears both.
 *
 * Same-origin iframe â direct DOM access. Link clicks inside the iframe are
 * intercepted (preventDefault) so accidental link presses don't navigate
 * away from the customer's site mid-edit.
 */

const SECTION_SELECTORS = [
  { selector: ".hero",         type: "hero",          label: "the headline area at the top" },
  { selector: ".services",     type: "services_grid", label: "the list of services" },
  { selector: ".testimonials", type: "testimonials",  label: "what customers are saying" },
  { selector: ".cta-section",  type: "cta",           label: "the call-out section near the bottom" },
  { selector: ".site-header",  type: "header",        label: "the top navigation bar" },
  { selector: ".site-footer",  type: "footer",        label: "the footer at the bottom" },
  { selector: ".gallery",      type: "gallery",       label: "the photo gallery" },
  { selector: ".form",         type: "form",          label: "the contact form" },
];

// Per-parent-type sub-element selectors, in priority order. The first match
// wins â so put more specific selectors before broader ones.
const SUB_SELECTORS_BY_PARENT = {
  hero: [
    { selector: "h1",            kind: "headline",     label: () => "the main headline" },
    { selector: ".lead",         kind: "subheadline",  label: () => "the subheadline" },
    { selector: ".btn",          kind: "cta_button",   label: (el) => 'the "' + (el.textContent || "").trim().slice(0, 40) + '" button' },
  ],
  services_grid: [
    { selector: ".service-card", kind: "service_card", label: (el) => 'the "' + (el.querySelector("h3")?.textContent || "service").trim().slice(0, 40) + '" service card' },
  ],
  testimonials: [
    { selector: ".testimonial-card", kind: "testimonial_card", label: (el) => 'the testimonial from ' + (el.querySelector(".author")?.textContent || "this person").trim().slice(0, 40) },
  ],
  cta: [
    { selector: "h2",            kind: "heading",      label: () => "the call-out heading" },
    { selector: ".btn",          kind: "cta_button",   label: (el) => 'the "' + (el.textContent || "").trim().slice(0, 40) + '" button' },
  ],
  header: [
    { selector: ".brand-logo",   kind: "header_logo",  label: () => "the logo / business name" },
    { selector: ".nav-link",     kind: "nav_link",     label: (el) => 'the "' + (el.textContent || "").trim().slice(0, 30) + '" nav link' },
    { selector: ".nav-cta",      kind: "header_phone", label: () => "the phone button at the top" },
  ],
  footer: [
    { selector: ".footer-link",  kind: "footer_link",  label: (el) => 'the footer link "' + (el.textContent || "").trim().slice(0, 40) + '"' },
  ],
  gallery: [],
  form: [],
};

let selectedTarget = null;     // { type, index, label }
let selectedSubTarget = null;  // { kind, parentIndex, parentType, subIndex, label }
const $targetPill = document.getElementById("targetPill");
const $targetLabel = document.getElementById("targetLabel");
const $targetPillClose = document.getElementById("targetPillClose");

function setupSectionTargeting() {
  const doc = $iframe.contentDocument;
  if (!doc || !doc.body) return;
  if (doc.getElementById("press-section-targeting-styles")) return; // already set

  // Inject targeting styles once per iframe load
  const style = doc.createElement("style");
  style.id = "press-section-targeting-styles";
  style.textContent = [
    "[data-press-section] {",
    "  cursor: pointer;",
    "  transition: background-color 0.12s ease, outline-color 0.12s ease, box-shadow 0.12s ease;",
    "  outline: 2px solid transparent;",
    "  outline-offset: -2px;",
    "}",
    "[data-press-section]:hover {",
    "  background-color: rgba(16, 185, 129, 0.06) !important;",
    "  outline-color: rgba(16, 185, 129, 0.55);",
    "}",
    "[data-press-section].press-selected {",
    "  background-color: rgba(16, 185, 129, 0.10) !important;",
    "  outline-color: rgba(16, 185, 129, 0.85);",
    "  box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.15);",
    "}",
    "[data-press-section].press-parent-faded {",
    "  background-color: rgba(16, 185, 129, 0.04) !important;",
    "  outline-color: rgba(16, 185, 129, 0.45);",
    "}",
    "[data-press-section].press-selected [data-press-subsection],",
    "[data-press-section].press-parent-faded [data-press-subsection] {",
    "  cursor: pointer;",
    "  transition: background-color 0.12s ease, outline-color 0.12s ease;",
    "  outline: 2px solid transparent;",
    "  outline-offset: -2px;",
    "}",
    "[data-press-section].press-selected [data-press-subsection]:hover,",
    "[data-press-section].press-parent-faded [data-press-subsection]:hover {",
    "  outline-color: rgba(245, 158, 11, 0.5);",
    "}",
    "[data-press-subsection].press-sub-selected {",
    "  outline: 2px solid rgba(245, 158, 11, 1.0) !important;",
    "  outline-offset: -2px;",
    "  box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.18), 0 0 14px rgba(245, 158, 11, 0.30);",
    "}",
    /* ---- Step 2: inline text editing ---- */
    "[data-press-text-edit] { cursor: text; }",
    "[data-press-text-edit]:hover { cursor: text; }",
    /* press-editing matches press-sub-selected â same amber border + glow halo
       so the customer sees one consistent "this is your focus" treatment, no
       matter whether the click landed in a directly-editable text field or an
       AI-targetable container. */
    "[data-press-text-edit].press-editing {",
    "  outline: 2px solid rgba(245, 158, 11, 1.0) !important;",
    "  outline-offset: -2px;",
    "  cursor: text;",
    "  box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.18), 0 0 14px rgba(245, 158, 11, 0.30);",
    "}",
    "[data-press-text-edit][contenteditable]:focus {",
    "  outline: 2px solid rgba(245, 158, 11, 1.0) !important;",
    "  caret-color: rgb(15, 23, 42);",
    "}",
    /* ---- Step 4 (A5): pulse highlight on AI-applied global changes ---- */
    "@keyframes press-pulse-affected {",
    "  0%   { outline-color: rgba(245, 158, 11, 0); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }",
    "  20%  { outline-color: rgba(245, 158, 11, 0.95); box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.20); }",
    "  100% { outline-color: rgba(245, 158, 11, 0); box-shadow: 0 0 0 8px rgba(245, 158, 11, 0); }",
    "}",
    ".press-pulse-affected {",
    "  outline: 2px solid transparent;",
    "  outline-offset: 3px;",
    "  border-radius: 4px;",
    "  animation: press-pulse-affected 1.2s ease-out;",
    "}",
  ].join("\n");
  doc.head.appendChild(style);

  // Tag each known section + sub-elements (data attributes only â no per-element
  // click listeners; we delegate from doc.body below).
  let parentIdx = 0;
  SECTION_SELECTORS.forEach((spec) => {
    const els = Array.from(doc.querySelectorAll(spec.selector));
    els.forEach((el) => {
      el.setAttribute("data-press-section", String(parentIdx));
      el.setAttribute("data-press-type", spec.type);
      el.setAttribute("data-press-label", spec.label);

      const subs = SUB_SELECTORS_BY_PARENT[spec.type] || [];
      subs.forEach((subSpec) => {
        const subEls = Array.from(el.querySelectorAll(subSpec.selector));
        subEls.forEach((subEl, subIdx) => {
          if (subEl.hasAttribute("data-press-subsection")) return;
          subEl.setAttribute("data-press-subsection", subSpec.kind);
          subEl.setAttribute("data-press-sub-index", String(subIdx));
          subEl.setAttribute("data-press-sub-label", subSpec.label(subEl, subIdx));
        });
      });

      parentIdx++;
    });
  });

  // Tag text-bearing fields inside sections for inline edit (Step 2)
  tagEditableTexts(doc);

  // Intercept ALL link clicks inside the iframe so accidental link presses
  // don't navigate the iframe away while the customer is editing.
  doc.querySelectorAll("a[href]").forEach((link) => {
    link.addEventListener("click", (e) => {
      e.preventDefault();
    }, true /* useCapture */);
  });

  // Single delegated click handler with four outcomes:
  //   1. Already inline-editing the clicked element â let cursor placement happen
  //   2. data-press-text-edit element â enter inline edit mode (no AI, no chat)
  //   3. data-press-subsection element â AI sub-select (no two-click rule)
  //   4. data-press-section element â AI parent-select
  //   5. Click outside any tag â clear all selection
  // Capture phase + stopPropagation beats any internal page handlers.
  doc.body.addEventListener("click", (e) => {
    // 1. Click inside the active editor â let the browser handle cursor placement
    if (activelyEditing && activelyEditing.el && activelyEditing.el.contains(e.target)) {
      return;
    }
    // Different element clicked â if there's an active edit, commit it first
    if (activelyEditing) commitInlineEdit();

    // 2. Inline text edit
    const textEl = e.target.closest("[data-press-text-edit]");
    if (textEl) {
      e.preventDefault();
      e.stopPropagation();
      enterInlineEdit(textEl);
      return;
    }

    // 3. Container sub-element AI select (single click, no two-click rule)
    const subEl = e.target.closest("[data-press-subsection]");
    if (subEl) {
      const parent = subEl.closest("[data-press-section]");
      if (parent) {
        e.preventDefault();
        e.stopPropagation();
        selectSubElement(subEl, parent);
        return;
      }
    }

    // 4. Section parent AI select
    const sectionEl = e.target.closest("[data-press-section]");
    if (sectionEl) {
      e.preventDefault();
      e.stopPropagation();
      selectSection(sectionEl);
      return;
    }

    // 5. Click outside any tagged thing â clear AI selection
    clearSelection();
  }, true /* capture */);
}

function selectSection(el) {
  const doc = $iframe.contentDocument;
  if (!doc) return;

  // Clear any previous parent + sub state
  doc.querySelectorAll(".press-selected, .press-parent-faded, .press-sub-selected")
    .forEach((s) => s.classList.remove("press-selected", "press-parent-faded", "press-sub-selected"));
  el.classList.add("press-selected");

  selectedTarget = {
    type: el.getAttribute("data-press-type"),
    label: el.getAttribute("data-press-label"),
    index: parseInt(el.getAttribute("data-press-section"), 10),
  };
  selectedSubTarget = null;
  $targetLabel.textContent = selectedTarget.label;
  $targetPill.classList.add("show");
}

function selectSubElement(subEl, parentEl) {
  const doc = $iframe.contentDocument;
  if (!doc) return;

  // Parent visually fades to "context"; sub becomes the active selection
  parentEl.classList.remove("press-selected");
  parentEl.classList.add("press-parent-faded");
  doc.querySelectorAll(".press-sub-selected").forEach((s) => s.classList.remove("press-sub-selected"));
  subEl.classList.add("press-sub-selected");

  selectedSubTarget = {
    kind: subEl.getAttribute("data-press-subsection"),
    parentIndex: parseInt(parentEl.getAttribute("data-press-section"), 10),
    parentType: parentEl.getAttribute("data-press-type"),
    subIndex: parseInt(subEl.getAttribute("data-press-sub-index"), 10),
    label: subEl.getAttribute("data-press-sub-label"),
  };
  $targetLabel.textContent = selectedSubTarget.label;
}

/* ---------- inline text editing (Step 2) ----------
 *
 * Direct manipulation of text in the iframe â Word/Docs pattern. Click a
 * text-bearing element, cursor lands, type to edit. Enter or click-outside
 * commits; Esc reverts. NO AI roundtrip for text changes.
 *
 * The diff op is generated locally and pushed to the same localStorage stack
 * Apply uses, so refresh persists the edit and the topbar truth-state lights
 * up amber as expected. The chat panel stays for AI-shaped requests (color,
 * layout, structural changes, ambiguous intent).
 */

let activelyEditing = null;

function tagEditableTexts(doc) {
  doc.querySelectorAll("[data-press-section]").forEach((section) => {
    const sectionIdx = parseInt(section.getAttribute("data-press-section"), 10);
    const type = section.getAttribute("data-press-type");

    if (type === "hero") {
      tagText(section.querySelector("h1"),
        { kind: "headline", label: "the main headline",
          path: "sections[" + sectionIdx + "].props.headline", multiline: false });
      tagText(section.querySelector(".lead.hero-sub, .hero-sub, .lead"),
        { kind: "subheadline", label: "the subheadline",
          path: "sections[" + sectionIdx + "].props.subheadline", multiline: true });
    }
    if (type === "services_grid") {
      tagText(section.querySelector("h2"),
        { kind: "heading", label: "the section heading",
          path: "sections[" + sectionIdx + "].props.heading", multiline: false });
      Array.from(section.querySelectorAll(".service-card")).forEach((card, cardIdx) => {
        tagText(card.querySelector("h3, h4, .service-title"),
          { kind: "service_name", label: "service name",
            path: "services[" + cardIdx + "].name", multiline: false });
        tagText(card.querySelector("p, .service-desc"),
          { kind: "service_description", label: "service description",
            path: "services[" + cardIdx + "].description", multiline: true });
      });
    }
    if (type === "testimonials") {
      tagText(section.querySelector("h2"),
        { kind: "heading", label: "the section heading",
          path: "sections[" + sectionIdx + "].props.heading", multiline: false });
      Array.from(section.querySelectorAll(".testimonial-card")).forEach((card, cardIdx) => {
        tagText(card.querySelector(".quote, blockquote, p:not(.author):not(.role)"),
          { kind: "testimonial_quote", label: "testimonial quote",
            path: "sections[" + sectionIdx + "].props.testimonials[" + cardIdx + "].quote", multiline: true });
        tagText(card.querySelector(".author"),
          { kind: "testimonial_author", label: "testimonial author",
            path: "sections[" + sectionIdx + "].props.testimonials[" + cardIdx + "].author", multiline: false });
        tagText(card.querySelector(".role"),
          { kind: "testimonial_role", label: "testimonial role",
            path: "sections[" + sectionIdx + "].props.testimonials[" + cardIdx + "].role", multiline: false });
      });
    }
    if (type === "cta") {
      tagText(section.querySelector("h2"),
        { kind: "heading", label: "the call-out heading",
          path: "sections[" + sectionIdx + "].props.heading", multiline: false });
      tagText(section.querySelector(".cta-sub, .lead.cta-sub"),
        { kind: "subheading", label: "the line under the call-out heading",
          path: "sections[" + sectionIdx + "].props.subheading", multiline: true });
    }

    // Step 3: header + footer
    if (type === "header") {
      tagText(section.querySelector(".brand-logo"),
        { kind: "business_name", label: "your business name",
          path: "business.name", multiline: false });
    }
    if (type === "footer") {
      tagText(section.querySelector(".footer-brand"),
        { kind: "business_name", label: "your business name (in the footer)",
          path: "business.name", multiline: false });
      tagText(section.querySelector(".footer-tagline"),
        { kind: "footer_tagline", label: "the footer tagline",
          path: "business.tagline", multiline: true });
      tagText(section.querySelector(".footer-address, .footer-link.footer-address"),
        { kind: "footer_address", label: "the footer address",
          path: "business.contact.address", multiline: true });
      // Footer tel link â editing just changes the displayed phone, but the
      // commit handler also writes business.contact.phone + the href below.
      const telLink = section.querySelector(".footer-link[href^='tel:']");
      if (telLink) {
        tagText(telLink,
          { kind: "footer_phone", label: "the phone number",
            path: "business.contact.phone", multiline: false, isPhone: true });
      }
    }
  });

  // Step 3: button labels â hero CTA, cta-section CTA, header phone button.
  // Buttons contain an SVG icon child that shouldn't be exposed to
  // contenteditable; isButton triggers the SVG-stash dance in enterInlineEdit.
  // The header's nav-cta is just the phone number (no "Call " prefix), so it
  // maps directly to business.contact.phone instead of sections[N].cta_label.
  doc.querySelectorAll("[data-press-section]").forEach((section) => {
    const sectionIdx = parseInt(section.getAttribute("data-press-section"), 10);
    const type = section.getAttribute("data-press-type");

    if (type === "header") {
      // Header phone button â text IS the phone number, write directly to
      // business.contact.phone. isPhone triggers tel-href + cross-page sync.
      Array.from(section.querySelectorAll(".nav-cta, .btn")).forEach((btn) => {
        if (btn.hasAttribute("data-press-text-edit")) return;
        tagText(btn,
          { kind: "header_phone_button", label: "the phone number at the top",
            path: "business.contact.phone",
            multiline: false, isButton: true, isPhone: true });
      });
      return;
    }

    if (type === "hero" || type === "cta") {
      Array.from(section.querySelectorAll(".btn, .hero-cta, .cta-btn")).forEach((btn) => {
        if (btn.hasAttribute("data-press-text-edit")) return;
        tagText(btn,
          { kind: "button_label", label: "the button text",
            path: "sections[" + sectionIdx + "].props.cta_label",
            multiline: false, isButton: true });
      });
    }
  });
}

function tagText(el, info) {
  if (!el) return;
  if (el.hasAttribute("data-press-text-edit")) return;
  el.setAttribute("data-press-text-edit", info.kind);
  el.setAttribute("data-press-text-edit-path", info.path);
  el.setAttribute("data-press-text-edit-label", info.label);
  if (info.multiline) el.setAttribute("data-press-text-edit-multiline", "true");
  if (info.isButton)  el.setAttribute("data-press-text-edit-button",  "true");
  if (info.isPhone)   el.setAttribute("data-press-text-edit-phone",   "true");
}

function enterInlineEdit(el) {
  if (activelyEditing && activelyEditing.el === el) return;
  if (activelyEditing) commitInlineEdit();

  const info = {
    kind: el.getAttribute("data-press-text-edit"),
    path: el.getAttribute("data-press-text-edit-path"),
    label: el.getAttribute("data-press-text-edit-label"),
    multiline: el.hasAttribute("data-press-text-edit-multiline"),
    isButton:  el.hasAttribute("data-press-text-edit-button"),
    isPhone:   el.hasAttribute("data-press-text-edit-phone"),
  };

  // Update the chat pill so the customer sees exactly what's targeted, even
  // when they're directly typing into the element. Both flows (direct edit
  // and chat-driven edit) target the same element â the pill reflects that.
  const doc = $iframe.contentDocument;
  if (doc) {
    doc.querySelectorAll(".press-selected, .press-parent-faded, .press-sub-selected")
      .forEach((s) => s.classList.remove("press-selected", "press-parent-faded", "press-sub-selected"));
  }
  const parentSection = el.closest("[data-press-section]");
  if (parentSection) {
    parentSection.classList.add("press-parent-faded");
    selectedTarget = {
      type: parentSection.getAttribute("data-press-type"),
      label: parentSection.getAttribute("data-press-label"),
      index: parseInt(parentSection.getAttribute("data-press-section"), 10),
    };
    selectedSubTarget = {
      kind: info.kind,
      parentIndex: selectedTarget.index,
      parentType: selectedTarget.type,
      subIndex: 0,
      label: info.label,
    };
  } else {
    selectedTarget = null;
    selectedSubTarget = { kind: info.kind, parentIndex: 0, parentType: null, subIndex: 0, label: info.label };
  }
  $targetLabel.textContent = info.label;
  $targetPill.classList.add("show");

  // For buttons: protect any child SVG icon from the contenteditable cursor by
  // marking it contenteditable="false". This keeps the SVG in the DOM (so the
  // button doesn't visibly shrink), but tells the browser the cursor must not
  // land on it and the user can't delete it. Restored on commit/revert.
  if (info.isButton) {
    const svg = el.querySelector("svg");
    if (svg) {
      el._pressProtectedSVG = svg;
      svg.setAttribute("contenteditable", "false");
    }
  }

  const originalText = info.multiline ? el.textContent : el.textContent.trim();

  // contenteditable=plaintext-only blocks pasted markup (Word junk) and rich
  // input â we just want a plain text field. Falls back gracefully on browsers
  // that don't support plaintext-only (it'll behave like contenteditable=true).
  el.setAttribute("contenteditable", "plaintext-only");
  el.classList.add("press-editing");
  el.dataset.pressOriginalText = originalText;

  // Focus on next tick â lets the click event finish first so the cursor lands
  // at the click position naturally.
  setTimeout(() => {
    el.focus();
    // If browser didn't place cursor (rare), drop it at end of text
    try {
      const sel = $iframe.contentWindow.getSelection();
      if (sel && sel.rangeCount === 0 && el.firstChild) {
        const range = $iframe.contentDocument.createRange();
        range.selectNodeContents(el);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
      }
    } catch (e) { /* selection not available â ignore */ }
  }, 0);

  const keydownListener = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      commitInlineEdit();
    } else if (e.key === "Escape") {
      e.preventDefault();
      revertInlineEdit();
    }
  };
  // Blur fires when the user clicks elsewhere; small delay so a sibling click
  // event has a chance to commit cleanly without race conditions.
  const blurListener = () => {
    setTimeout(() => {
      if (activelyEditing && activelyEditing.el === el) commitInlineEdit();
    }, 50);
  };
  el.addEventListener("keydown", keydownListener);
  el.addEventListener("blur", blurListener);

  activelyEditing = { el, originalText, info, keydownListener, blurListener };
}

function commitInlineEdit() {
  if (!activelyEditing) return;
  const { el, originalText, info, keydownListener, blurListener } = activelyEditing;
  const newValue = info.multiline ? el.textContent : el.textContent.trim();

  // Tear down editor state regardless of whether the value changed
  el.removeAttribute("contenteditable");
  el.classList.remove("press-editing");
  el.removeEventListener("keydown", keydownListener);
  el.removeEventListener("blur", blurListener);
  delete el.dataset.pressOriginalText;
  activelyEditing = null;

  // Unprotect SVG (the cursor can land on it normally again outside edit mode).
  // The SVG was never removed from the DOM â only marked contenteditable="false" â
  // so there's nothing to re-append; just clean up the attribute.
  if (info.isButton && el._pressProtectedSVG) {
    el._pressProtectedSVG.removeAttribute("contenteditable");
    delete el._pressProtectedSVG;
  }

  // No-op if unchanged
  if (newValue === originalText) return;

  // Empty value would visually blank the element forever â refuse the edit
  // and restore the original. A customer fat-fingering Backspace shouldn't
  // be able to silently destroy their headline.
  if (newValue.length === 0) {
    el.textContent = originalText;
    return;
  }

  // Build the diff ops. Most edits emit a single op. Phone-bearing edits emit
  // up to three so the visible text, the tel: href, and the global
  // business.contact.phone all stay in sync.
  const ops = [{ op: "set", path: info.path, value: newValue }];

  // Phone magic: if this is a button label OR a footer phone link, see if the
  // committed text contains a phone-number pattern. If so, also write
  // business.contact.phone and (for buttons) the matching cta_href.
  if (info.isButton || info.isPhone) {
    const m = newValue.match(/\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4}/);
    if (m) {
      const phone = m[0];
      // Update the global business phone (synced everywhere via replay logic)
      if (info.path !== "business.contact.phone") {
        ops.push({ op: "set", path: "business.contact.phone", value: phone });
      }
      // For button labels, also rewrite the matching cta_href so tap-to-call works
      if (info.isButton && info.path.endsWith(".cta_label")) {
        const hrefPath = info.path.replace(/\.cta_label$/, ".cta_href");
        ops.push({ op: "set", path: hrefPath, value: "tel:" + phone.replace(/[^\d+]/g, "") });
      }
    }
  }

  pushDiffOps(ops);                               // persist via localStorage so refresh restores
  ops.forEach((op) => applyOpToCurrentSite(op)); // keep in-memory siteJson fresh

  // Cross-page visual sync: re-run the same replay logic that fires on iframe
  // load, so any other DOM instances of the same schema field (e.g. footer
  // brand syncing with header logo, all phone buttons updating together)
  // refresh visually without waiting for a reload.
  const doc = $iframe.contentDocument;
  if (doc) ops.forEach((op) => { try { applyOpToIframe(doc, op); } catch (e) { console.warn("sync skip:", op, e); } });

  history.unshift({
    siteJson: structuredClone(currentSite),
    narration: "Edited " + info.label,
    timestamp: Date.now(),
  });
  renderHistory();
  flashSaveStatus("Updated " + info.label);
}

function revertInlineEdit() {
  if (!activelyEditing) return;
  const { el, originalText, info, keydownListener, blurListener } = activelyEditing;
  // For buttons: the SVG is still in the DOM (we only marked it
  // contenteditable="false"), so setting textContent would wipe it. Walk text
  // nodes instead and restore only the original text content.
  if (info && info.isButton && el._pressProtectedSVG) {
    // Replace text-bearing children with the original text, keep the SVG.
    const svg = el._pressProtectedSVG;
    Array.from(el.childNodes).forEach((n) => {
      if (n !== svg) el.removeChild(n);
    });
    el.insertBefore(document.createTextNode(originalText + " "), svg);
    svg.removeAttribute("contenteditable");
    delete el._pressProtectedSVG;
  } else {
    el.textContent = originalText;
  }
  el.removeAttribute("contenteditable");
  el.classList.remove("press-editing");
  el.removeEventListener("keydown", keydownListener);
  el.removeEventListener("blur", blurListener);
  delete el.dataset.pressOriginalText;
  activelyEditing = null;
}

// Apply a diff op against the in-memory currentSite so subsequent AI prompts
// get the freshest text. Mirrors the server's applier but kept in JS-land.
function applyOpToCurrentSite(op) {
  if (op.op !== "set") return;
  setSitePath(currentSite, op.path, op.value);
}

function setSitePath(obj, path, value) {
  const re = /([^.[\]]+)|\[(\d+)\]/g;
  const tokens = [];
  let m;
  while ((m = re.exec(path)) !== null) {
    if (m[1]) tokens.push({ key: m[1] });
    else if (m[2] !== undefined) tokens.push({ idx: parseInt(m[2], 10) });
  }
  if (tokens.length === 0) return;
  let cur = obj;
  for (let i = 0; i < tokens.length - 1; i++) {
    const t = tokens[i];
    cur = ("key" in t) ? cur[t.key] : cur[t.idx];
    if (cur === undefined || cur === null) return;
  }
  const last = tokens[tokens.length - 1];
  if ("key" in last) cur[last.key] = value;
  else cur[last.idx] = value;
}

function clearSelection() {
  const doc = $iframe.contentDocument;
  if (doc) {
    doc.querySelectorAll(".press-selected, .press-parent-faded, .press-sub-selected")
      .forEach((s) => s.classList.remove("press-selected", "press-parent-faded", "press-sub-selected"));
  }
  $targetLabel.textContent = ""; // B13: don't leave stale label hanging
  selectedTarget = null;
  selectedSubTarget = null;
  $targetPill.classList.remove("show");
}

// Re-setup on every iframe load (initial + after navigations / reloads).
// Also replays any locally-applied diffs so refresh doesn't erase changes.
function onIframeLoad() {
  setupSectionTargeting();
  replayDiffsInIframe();
}
$iframe.addEventListener("load", onIframeLoad);
// In case the iframe is already loaded by the time this runs
if ($iframe.contentDocument && $iframe.contentDocument.readyState === "complete") {
  onIframeLoad();
}
$targetPillClose.addEventListener("click", clearSelection);

/* ---------- mouse-wheel forwarding into iframe (B01) ----------
 *
 * Cross-context wheel events don't reliably scroll an iframe's inner document
 * when the iframe is inside a flex/grid layout with multiple overflow contexts.
 * Forward the parent-page wheel events directly to the iframe's contentWindow
 * so the customer can scroll the preview naturally with their mouse.
 */
const $iframeWrap = document.getElementById("previewTab");
$iframeWrap.addEventListener("wheel", (e) => {
  if (!$iframe.contentWindow) return;
  e.preventDefault();
  $iframe.contentWindow.scrollBy({ top: e.deltaY, left: e.deltaX, behavior: "instant" });
}, { passive: false });

/* ---------- bootstrap ---------- */

renderHistory();
updateSaveStatus();   // derive topbar truth-state from localStorage on load
$input.focus();
</script>
</body>
</html>
