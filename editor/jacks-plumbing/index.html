<style>
  :root {
    --bg: #FBFBFC;
    --ink: #0F172A;
    --ink-soft: #1E293B;
    --slate: #64748B;
    --slate-light: #94A3B8;
    --rule: #E5E7EB;
    --rule-strong: #D1D5DB;
    --primary: #2563EB;
    --primary-soft: rgba(37, 99, 235, 0.08);
    --primary-deep: #1D4ED8;
    --green: #10B981;
    --green-soft: rgba(16, 185, 129, 0.1);
    --red: #DC2626;
    --red-soft: rgba(220, 38, 38, 0.08);
    --amber-soft: rgba(245, 158, 11, 0.12);
    --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-sans);

  }
  .app { display: grid; grid-template-rows: 56px 1fr; height: 100vh; }

  /* ---- topbar ---- */
  .topbar { display: flex; align-items: center; padding: 0 1.25rem; background: white; border-bottom: 1px solid var(--rule); gap: 1rem; }
  .brand { font-weight: 700; font-size: 0.9375rem; letter-spacing: -0.015em; }
  .brand .slash { color: var(--slate); font-weight: 500; }
  .topbar-divider { width: 1px; height: 22px; background: var(--rule); }
  .topbar-site { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--ink-soft); }
  .topbar-site .domain { color: var(--slate); font-weight: 500; }
  .save-status { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.8125rem; color: var(--slate); margin-left: auto; margin-right: 0.5rem; }
  .save-status .dot { width: 7px; height: 7px; background: var(--green); border-radius: 999px; box-shadow: 0 0 0 3px var(--green-soft); transition: background-color 0.2s ease, box-shadow 0.2s ease; }
  .save-status.local .dot { background: #F59E0B; box-shadow: 0 0 0 3px rgba(245,158,11,0.18); }
  .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 0.9rem; font-size: 0.875rem; font-weight: 600; border-radius: 8px; border: 1px solid transparent; text-decoration: none; cursor: pointer; font-family: inherit; transition: transform 0.12s, box-shadow 0.12s, background 0.15s; }
  .btn-ghost { background: white; color: var(--ink); border-color: var(--rule-strong); }
  .btn-ghost:hover { border-color: var(--slate); }
  .btn-primary { background: var(--primary); color: white; box-shadow: 0 1px 2px rgba(15,23,42,0.04), 0 4px 12px rgba(37,99,235,0.18); }
  .btn-primary:hover { background: var(--primary-deep); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ---- main split ---- */
  .main { display: grid; grid-template-columns: 380px 1fr; height: 100%; overflow: hidden; }

  /* ---- chat side ---- */
  .chat { display: flex; flex-direction: column; background: white; border-right: 1px solid var(--rule); min-height: 0; overflow: hidden; }
  .chat-head { padding: 1.25rem; border-bottom: 1px solid var(--rule); }
  .chat-head h2 { margin: 0 0 0.25rem 0; font-size: 1.0625rem; font-weight: 700; letter-spacing: -0.015em; }
  .chat-head p { margin: 0; font-size: 0.8125rem; color: var(--slate); line-height: 1.5; }
  .messages { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 0.85rem; min-height: 0; }
  .messages:empty::before { content: "Tip: click any text in the preview to edit it directly. Use chat for color, layout, or \"make it look better\" type changes."; display: block; padding: 1rem; font-size: 0.8125rem; color: var(--slate-light); font-style: italic; line-height: 1.5; text-align: center; }

  .msg { max-width: 92%; font-size: 0.9rem; line-height: 1.5; }
  .msg.user { align-self: flex-end; background: var(--primary); color: white; padding: 0.6rem 0.9rem; border-radius: 12px 12px 2px 12px; }
  .msg.assistant { align-self: flex-start; }
  .msg.assistant .text { background: var(--bg); padding: 0.7rem 0.9rem; border-radius: 12px 12px 12px 2px; border: 1px solid var(--rule); }
  .msg.assistant .diff { margin-top: 0.5rem; background: white; border: 1px solid var(--rule); border-radius: 10px; overflow: hidden; font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; font-size: 0.75rem; }
  .diff-row { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--rule); display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
  .diff-row:last-child { border-bottom: 0; }
  .diff-op { display: inline-block; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.15rem 0.4rem; border-radius: 4px; flex-shrink: 0; }
  .diff-op.set { background: var(--amber-soft); color: #92400E; }
  .diff-op.insert { background: var(--green-soft); color: #065F46; }
  .diff-op.remove { background: var(--red-soft); color: #991B1B; }
  .diff-op.move { background: var(--primary-soft); color: var(--primary); }
  .diff-path { color: var(--slate); flex-shrink: 0; }
  .diff-value { color: var(--ink); margin-left: auto; font-weight: 600; word-break: break-word; max-width: 60%; text-align: right; }
  .diff-color { display: inline-block; width: 12px; height: 12px; border-radius: 3px; border: 1px solid var(--rule-strong); vertical-align: -2px; margin-right: 0.25rem; }

  .msg-meta { font-size: 0.75rem; color: var(--slate); margin-top: 0.4rem; display: flex; gap: 0.6rem; align-items: center; }
  .confidence-bar { width: 56px; height: 4px; background: var(--rule); border-radius: 2px; overflow: hidden; }
  .confidence-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s ease; }
  .confidence-fill.low { background: var(--red); }
  .confidence-fill.med { background: #F59E0B; }

  .msg-actions { margin-top: 0.5rem; display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .msg-actions .btn { padding: 0.4rem 0.75rem; font-size: 0.8125rem; }

  .warnings { margin-top: 0.4rem; font-size: 0.78rem; color: #92400E; background: var(--amber-soft); padding: 0.5rem 0.7rem; border-radius: 8px; line-height: 1.45; }
  .warnings ul { margin: 0; padding-left: 1.1rem; }

  .error-msg { background: var(--red-soft); border: 1px solid var(--red); color: var(--red); padding: 0.6rem 0.85rem; border-radius: 10px; font-size: 0.85rem; line-height: 1.4; }
  .error-msg .error-text { color: var(--red); }
  .error-msg .error-actions { display: flex; gap: 0.4rem; margin-top: 0.55rem; flex-wrap: wrap; }
  .error-msg .error-action-btn { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.32rem 0.65rem; background: white; color: var(--ink-soft); border: 1px solid rgba(220, 38, 38, 0.35); border-radius: 6px; font-size: 0.78rem; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.12s, border-color 0.12s, color 0.12s; }
  .error-msg .error-action-btn:hover { background: var(--bg); border-color: var(--red); color: var(--ink); }
  .error-msg .error-action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg .error-action-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  .composer { border-top: 1px solid var(--rule); padding: 0.85rem 1rem; background: white; }
  .composer-input { width: 100%; border: 1px solid var(--rule-strong); border-radius: 10px; padding: 0.7rem 0.9rem; font-family: inherit; font-size: 0.9rem; resize: none; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  .composer-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .composer-input:focus::placeholder { color: white; }
  .composer-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; font-size: 0.72rem; color: var(--slate); }
  .composer-send { padding: 0.45rem 0.95rem; font-size: 0.8125rem; }

  .thinking { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--slate); font-size: 0.85rem; font-style: italic; }
  .thinking .dot { width: 6px; height: 6px; background: var(--slate); border-radius: 50%; animation: pulse 1.4s ease-in-out infinite; }
  .thinking .dot:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

  /* ---- target pill (shows "Editing: [section]" when a section is clicked in preview) ---- */
  .target-pill { display: none; align-items: center; gap: 0.45rem; background: rgba(16, 185, 129, 0.1); color: #047857; padding: 0.35rem 0.65rem 0.35rem 0.75rem; border-radius: 999px; font-size: 0.8125rem; font-weight: 500; margin-bottom: 0.55rem; border: 1px solid rgba(16, 185, 129, 0.35); width: fit-content; max-width: 100%; }
  .target-pill.show { display: inline-flex; }
  .target-pill .pin { width: 8px; height: 8px; background: var(--green); border-radius: 999px; box-shadow: 0 0 0 3px rgba(16,185,129,0.18); flex-shrink: 0; }
  .target-pill strong { color: #064E3B; font-weight: 600; }
  .target-pill-close { background: none; border: 0; color: #047857; cursor: pointer; padding: 0 0 0 0.15rem; font-size: 1.1rem; line-height: 1; flex-shrink: 0; opacity: 0.7; }
  .target-pill-close:hover { opacity: 1; color: #064E3B; }

  /* ---- preview side ---- */
  .preview { display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
  .preview-head { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: white; border-bottom: 1px solid var(--rule); }
  .preview-tabs { display: flex; gap: 0.25rem; }
  .preview-tab { padding: 0.45rem 0.8rem; font-size: 0.8125rem; font-weight: 500; border: 1px solid var(--rule); background: white; border-radius: 8px; color: var(--ink-soft); cursor: pointer; font-family: inherit; }
  .preview-tab.active { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); font-weight: 600; }
  .preview-url { flex: 1; margin: 0 0.75rem; background: var(--bg); padding: 0.45rem 0.8rem; border-radius: 8px; font-size: 0.8125rem; color: var(--slate); font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; }
  .device-toggle { display: flex; gap: 0; border: 1px solid var(--rule); border-radius: 8px; overflow: hidden; }
  .device-toggle button { padding: 0.4rem 0.6rem; background: white; border: 0; cursor: pointer; color: var(--slate); border-right: 1px solid var(--rule); }
  .device-toggle button:last-child { border-right: 0; }
  .device-toggle button.active { background: var(--primary-soft); color: var(--primary); }

  .preview-frame-wrap { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 1.5rem; overflow: auto; }
  .preview-frame { width: 100%; max-width: 1100px; height: 100%; background: white; border-radius: 12px; border: 1px solid var(--rule); box-shadow: 0 1px 2px rgba(15,23,42,0.04), 0 24px 48px rgba(15,23,42,0.06); overflow: hidden; display: flex; flex-direction: column; transition: max-width 0.3s ease; }
  .preview-frame.mobile { max-width: 380px; }
  .preview-frame iframe { flex: 1; width: 100%; border: 0; display: block; }
  .preview-overlay { flex-shrink: 0; height: 38px; background: white; border-bottom: 1px solid var(--rule); display: flex; align-items: center; padding: 0 0.85rem; gap: 0.4rem; }
  .preview-dot { width: 11px; height: 11px; border-radius: 999px; }
  .preview-dot.r { background: #FF5F57; } .preview-dot.y { background: #FEBC2E; } .preview-dot.g { background: #28C840; }
  .preview-nav { display: inline-flex; gap: 0.2rem; margin-left: 0.6rem; }
  .preview-nav button { width: 24px; height: 24px; padding: 0; background: white; border: 1px solid var(--rule); border-radius: 6px; color: var(--ink-soft); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 0.85rem; line-height: 1; transition: background 0.12s, color 0.12s, border-color 0.12s; }
  .preview-nav button:hover { background: var(--bg); color: var(--ink); border-color: var(--rule-strong); }
  .preview-nav button:active { background: var(--primary-soft); color: var(--primary); border-color: var(--primary); }
  .preview-nav button svg { width: 13px; height: 13px; display: block; }
  .preview-overlay-url { margin-left: 0.6rem; font-size: 0.75rem; color: var(--slate); font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; }

  /* ---- history side panel ---- */
  .history-tab { display: none; }
  .history-tab.active { display: flex; flex-direction: column; flex: 1; padding: 1.5rem; overflow-y: auto; gap: 1rem; }
  .history-row { display: flex; align-items: flex-start; gap: 0.85rem; padding: 0.85rem 1rem; background: white; border: 1px solid var(--rule); border-radius: 10px; }
  .history-dot { flex-shrink: 0; width: 10px; height: 10px; background: var(--slate-light); border-radius: 50%; margin-top: 0.5rem; }
  .history-row.current .history-dot { background: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }
  .history-row.launch .history-dot { background: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .history-meta { flex: 1; min-width: 0; }
  .history-narration { font-size: 0.9rem; color: var(--ink); font-weight: 500; line-height: 1.4; }
  .history-time { font-size: 0.75rem; color: var(--slate); margin-top: 0.2rem; }
  .history-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
  .history-row.current .history-actions { visibility: hidden; }

  /* ---- color picker (Step 2.5a) ---- */
  .color-picker { margin-top: 0.5rem; background: white; border: 1px solid var(--rule); border-radius: 10px; padding: 0.85rem; }
  .cp-row { margin-bottom: 0.75rem; }
  .cp-row:last-of-type { margin-bottom: 0; }
  .cp-row-label { font-size: 0.7rem; font-weight: 600; color: var(--slate); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
  .cp-pick-row { display: flex; align-items: center; gap: 0.75rem; }
  .cp-pick-hex { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; font-size: 0.8rem; color: var(--ink-soft); font-weight: 600; }
  .cp-swatch-grid { display: flex; flex-wrap: wrap; gap: 0.32rem; }
  .cp-grid-family { display: flex; gap: 0.25rem; margin-bottom: 0.25rem; }
  .cp-grid-family:last-child { margin-bottom: 0; }
  .cp-swatch { padding: 0; border: 1px solid var(--rule-strong); border-radius: 5px; cursor: pointer; transition: outline 0.12s, transform 0.12s, box-shadow 0.12s; outline: 2px solid transparent; outline-offset: 1px; flex-shrink: 0; }
  .cp-swatch:hover { outline-color: rgba(245, 158, 11, 0.55); transform: scale(1.06); }
  .cp-swatch.selected { outline: 3px solid #F59E0B; box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.18), 0 0 14px rgba(245, 158, 11, 0.30); }
  .cp-swatch-large { width: 56px; height: 56px; border-radius: 8px; }
  .cp-swatch-med { width: 30px; height: 30px; }
  .cp-swatch-small { width: 22px; height: 22px; border-radius: 4px; }
  .cp-hex-input { width: 130px; border: 1px solid var(--rule-strong); border-radius: 6px; padding: 0.4rem 0.55rem; font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; font-size: 0.82rem; outline: none; transition: border-color 0.15s, box-shadow 0.15s; text-transform: uppercase; }
  .cp-hex-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .cp-hex-input.invalid { border-color: var(--red); }
  .cp-current { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--bg); padding: 0.4rem 0.65rem; border-radius: 6px; border: 1px solid var(--rule); font-size: 0.78rem; color: var(--slate); }
  .cp-current-swatch { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--rule-strong); flex-shrink: 0; }
  .cp-current-hex { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; color: var(--ink-soft); font-weight: 600; }
  .cp-actions { display: flex; gap: 0.4rem; margin-top: 0.6rem; }
  .cp-actions .btn { padding: 0.4rem 0.75rem; font-size: 0.8125rem; }
  .cp-collapsed { font-size: 0.85rem; color: #047857; display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; background: var(--green-soft); border-radius: 8px; }
  .cp-collapsed-swatch { width: 14px; height: 14px; border-radius: 4px; border: 1px solid var(--rule-strong); display: inline-block; }
  .cp-discarded { font-size: 0.8rem; color: var(--slate); padding: 0.4rem 0.6rem; background: var(--bg); border-radius: 6px; display: inline-block; }
</style>

<div class="app">

  <!-- topbar -->

<script>
"use strict";

/* ============================================================
 * Press editor â client-side controller
 *
 * State:
 *   currentSite â the customer's site.json as it is right now
 *   history     â array of { siteJson, narration, timestamp, isLaunch? }
 *
 * Flow:
 *   User types request â POST /api/edit with {siteJson, request}
 *     â response shows narration + diff + Apply/Undo buttons
 *   User clicks Apply â currentSite = response.proposedSite
 *     â push entry into history
 *     â patch the iframe preview live (where possible)
 *   User clicks Restore on a history row â currentSite = that entry
 *     â re-render preview
 * ============================================================ */

// Bootstrap with Jack's Plumbing fixture (in real product this is loaded from
// the customer's per-customer git repo â for V1 demo it's hard-coded).
const INITIAL_SITE = {
  meta: {
    customer_slug: "jacks-plumbing",
    template: "modern-clean",
    hero_variant: "cta",
    schema_version: 1,

async function sendRequest() {
  const request = $input.value.trim();
  if (!request) return;
  // Step 2.5a: if a color picker is mid-preview, sending a new request means
  // the customer moved on without confirming. Revert iframe and collapse.
  if (activeColorPicker) discardColorPicker(activeColorPicker);
  $input.value = "";
  $send.disabled = true;
  // The sub-target label takes precedence in display if both are set
  const tagForChat = selectedSubTarget
    ? { label: selectedSubTarget.label }
    : selectedTarget;
  appendUserMessage(request, tagForChat);
  const thinking = appendThinkingMessage();

  // Capture targets at send-time so the user can clear/change them without
  // affecting the in-flight request.
  const targetForSend = selectedTarget ? { ...selectedTarget } : null;
  const subTargetForSend = selectedSubTarget ? { ...selectedSubTarget } : null;

  try {
    const payload = { siteJson: currentSite, request };
    if (targetForSend) {
      payload.targetType = targetForSend.type;
      payload.targetIndex = targetForSend.index;
      payload.targetLabel = targetForSend.label;
    }
    if (subTargetForSend) {
      payload.subTargetKind = subTargetForSend.kind;
      payload.subTargetIndex = subTargetForSend.subIndex;
      payload.subTargetLabel = subTargetForSend.label;
    }
    const result = await postEditWithRetry(payload);
    thinking.remove();
    if (result.kind === "ok") {
      appendAssistantMessage(result.payload);
    } else if (result.kind === "rate_limited") {
      // Rate-limit: 60s cooldown on the Retry button so the customer can't
      // make a Cloudflare block worse by hammering. Copy is always available.
      appendErrorMessage("System busy. Try again in a few minutes.", {
        onRetry: (el) => retryRequest(request, payload, el),
        textToCopy: request,
        cooldownSeconds: 60,
      });
    } else if (result.kind === "api_error") {
      // API errors usually indicate a structural problem; retry won't help, but
      // copying the prompt lets the customer tweak and re-send without retyping.
      appendErrorMessage(result.message || `request failed (${result.status})`, {
        textToCopy: request,
      });
    } else {
      // Network errors: retry might help, no cooldown needed
      appendErrorMessage(result.message || "Network error. Try again.", {
        onRetry: (el) => retryRequest(request, payload, el),
        textToCopy: request,
      });
    }
  } catch (err) {
    thinking.remove();
    appendErrorMessage(err.message || "Network error. Try again.", {
      onRetry: (el) => retryRequest(request, payload, el),
      textToCopy: request,
    });
  } finally {
    $send.disabled = false;
    $input.focus();
  }
}

// Re-fire a previously-failed request without making the customer re-type or
// re-select. Used by the Retry button on chat error bubbles. The existing
// error bubble (errorEl) is updated in place rather than spawning a new
// stacked bubble â failed retries should not pile up.
async function retryRequest(originalText, payload, errorEl) {
  $send.disabled = true;
  const thinking = appendThinkingMessage();
  try {
    const result = await postEditWithRetry(payload);
    thinking.remove();
    if (result.kind === "ok") {
      // Success: drop the old error bubble entirely, show the assistant reply.
      if (errorEl && errorEl.parentNode) errorEl.parentNode.removeChild(errorEl);
      appendAssistantMessage(result.payload);
    } else if (result.kind === "rate_limited") {
      updateErrorBubble(errorEl, "Still busy. Try again in a few minutes.", {
        onRetry: (el) => retryRequest(originalText, payload, el),
        textToCopy: originalText,
        cooldownSeconds: 60,
      });
    } else if (result.kind === "api_error") {
      updateErrorBubble(errorEl, result.message || `request failed (${result.status})`, {
        textToCopy: originalText,
      });
    } else {
      updateErrorBubble(errorEl, result.message || "Network error. Try again.", {
        onRetry: (el) => retryRequest(originalText, payload, el),
        textToCopy: originalText,
      });
    }
  } catch (err) {
    thinking.remove();
    updateErrorBubble(errorEl, err.message || "Network error. Try again.", {
      onRetry: (el) => retryRequest(originalText, payload, el),
      textToCopy: originalText,
    });
  } finally {
    $send.disabled = false;
  }
}

// POST /api/edit. Categorizes the response so the chat UI can render the right
// kind of error bubble. Distinguishes between:
//   - ok           : real JSON returned by our Function
//   - rate_limited : HTML body (CF/upstream blocked us); show friendly toast
//   - api_error    : JSON error from our Function (4xx with structured body)
//   - network_error: fetch threw or response wasn't parseable as expected
//
// NOTE: this used to auto-retry once after 1.2s on rate_limited. Removed in
// Step 1.6 â Cloudflare's edge rate-limit windows EXTEND when you keep
// hitting them, so an internal auto-retry was making blocks worse rather than
// recovering from them. Retries are now driven exclusively by the customer
// clicking the Retry button (which has its own 60s cooldown to throttle abuse).
async function postEditWithRetry(payload) {
  let r;
  try {
    r = await fetch("/api/edit", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(payload)
    });
  } catch (e) {
    return { kind: "network_error", message: e && e.message ? e.message : "Network error" };
  }
  const text = await r.text();
  // Detect HTML-error-page responses (Cloudflare 502/rate-limit/firewall)
  const looksLikeHtml = text.startsWith("<!DOCTYPE") || text.startsWith("<html") || text.startsWith("<");
  if (looksLikeHtml) {
    return { kind: "rate_limited", status: r.status };
  }
  let j;
  try { j = JSON.parse(text); }
  catch { return { kind: "network_error", message: "Bad response from server" }; }
  if (!r.ok) {
    return { kind: "api_error", status: r.status, message: j.error || j.message || `request failed (${r.status})` };
  }
  return { kind: "ok", payload: j };
}

const ICON_RETRY = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>';

// appendErrorMessage(text, actions?) â actions is optional and may include:
//   - onRetry:           callback fired when the retry button is clicked.
//                        Receives the bubble element so a retry can update
//                        the SAME bubble in place rather than stacking a new one.
//   - textToCopy:        string to copy to clipboard when the copy button is clicked
//   - cooldownSeconds:   if > 0, disable the Retry button for N seconds with a
//                        live countdown ("Retry in 47s") so we don't let the
//                        customer hammer a rate-limited endpoint and make the
//                        block window worse.
// If actions is omitted or empty, the error renders as a plain bubble.
function appendErrorMessage(msg, actions) {
  const el = document.createElement("div");
  el.className = "msg assistant";

  const wrap = document.createElement("div");
  wrap.className = "error-msg";
  el.appendChild(wrap);

  buildErrorContent(wrap, el, msg, actions);

  $messages.appendChild(el);
  $messages.scrollTop = $messages.scrollHeight;
  return el;
}

// updateErrorBubble(el, text, actions?) â REPLACE the contents of an existing
// error bubble in place rather than appending a new one. Used by retryRequest
// when a retry fails again so we don't accumulate a column of duplicate errors.
function updateErrorBubble(el, msg, actions) {
  if (!el) return appendErrorMessage(msg, actions);
  const wrap = el.querySelector(".error-msg");
  if (!wrap) return appendErrorMessage(msg, actions);
  wrap.innerHTML = "";
  el.style.opacity = "1";
  buildErrorContent(wrap, el, msg, actions);
  $messages.scrollTop = $messages.scrollHeight;
  return el;
}

// Internal: render the inner content of an error bubble into `wrap`.
// Pulled out so appendErrorMessage and updateErrorBubble share rendering.
function buildErrorContent(wrap, bubbleEl, msg, actions) {
  const text = document.createElement("div");
  text.className = "error-text";
  text.textContent = msg;
  wrap.appendChild(text);

  if (!actions || (!actions.onRetry && !actions.textToCopy)) return;

  const actionRow = document.createElement("div");
  actionRow.className = "error-actions";

  if (actions.onRetry) {
    const retryBtn = document.createElement("button");
    retryBtn.type = "button";
    retryBtn.className = "error-action-btn";
    retryBtn.dataset.action = "retry";
    retryBtn.title = "Retry the same request";
    retryBtn.innerHTML = ICON_RETRY + "<span>Retry</span>";

    // Cooldown: disable + live-countdown for actions.cooldownSeconds.
    // Prevents the customer from amplifying a CF rate-limit by clicking Retry
    // every second.
    const cooldown = Number(actions.cooldownSeconds) || 0;
    let cooldownInterval = null;
    if (cooldown > 0) {
      let remaining = cooldown;
      retryBtn.disabled = true;
      retryBtn.querySelector("span").textContent = "Retry in " + remaining + "s";
      cooldownInterval = setInterval(() => {
        remaining -= 1;
        if (remaining <= 0) {
          clearInterval(cooldownInterval);
          cooldownInterval = null;
          retryBtn.disabled = false;
          retryBtn.querySelector("span").textContent = "Retry";
        } else {
          retryBtn.querySelector("span").textContent = "Retry in " + remaining + "s";
        }
      }, 1000);
    }

    retryBtn.addEventListener("click", () => {
      if (retryBtn.disabled) return;
      if (cooldownInterval) { clearInterval(cooldownInterval); cooldownInterval = null; }
      retryBtn.disabled = true;
      retryBtn.querySelector("span").textContent = "Retrying...";
      bubbleEl.style.transition = "opacity 0.2s ease";
      bubbleEl.style.opacity = "0.5";
      try { actions.onRetry(bubbleEl); }
      catch (e) { console.warn("Retry callback threw:", e); }
    });
    actionRow.appendChild(retryBtn);
  }

  if (actions.textToCopy) {
    const copyBtn = document.createElement("button");
    copyBtn.type = "button";
    copyBtn.className = "error-action-btn";
    copyBtn.dataset.action = "copy";
    copyBtn.title = "Copy your message to clipboard";
    copyBtn.innerHTML = ICON_COPY + "<span>Copy your message</span>";
    copyBtn.addEventListener("click", async () => {
      const labelEl = copyBtn.querySelector("span");
      try {
        await navigator.clipboard.writeText(actions.textToCopy);
        copyBtn.innerHTML = ICON_CHECK + "<span>Copied</span>";
        setTimeout(() => {
          copyBtn.innerHTML = ICON_COPY + "<span>Copy your message</span>";
        }, 1500);
      } catch {
        if (labelEl) labelEl.textContent = "Copy failed";
      }
    });
    actionRow.appendChild(copyBtn);
  }

  wrap.appendChild(actionRow);
}

function appendAssistantMessage(payload) {
  const { narration, diff, confidence, warnings, proposedSite, validated, validationError } = payload;

  // Step 2.5a: color-change diffs render as a swatch picker rather than the
  // standard diff card. Detection is single-op SET on brand.colors.* with a
  // hex value. Multi-op or non-color diffs fall through to the standard render.
  const isColorPicker = isColorPickerDiff(diff);

  const el = document.createElement("div");
  el.className = "msg assistant";

  let html = `<div class="text">${escapeHtml(narration)}</div>`;
  if (diff && diff.length > 0 && !isColorPicker) {
    html += `<div class="diff">${diff.map(renderDiffRow).join("")}</div>`;
  }

  // confidence + provider meta
  const confClass = confidence >= 0.8 ? "" : confidence >= 0.6 ? "med" : "low";
  html += `
    <div class="msg-meta">
      <span class="confidence-bar"><span class="confidence-fill ${confClass}" style="width:${Math.round((confidence || 0) * 100)}%"></span></span>
      <span>${Math.round((confidence || 0) * 100)}% confident Â· ${escapeHtml(payload.provider || "ai")}</span>
    </div>`;

  // warnings
  if (warnings && warnings.length > 0) {
    html += `<div class="warnings"><ul>${warnings.map(w => `<li>${escapeHtml(w)}</li>`).join("")}</ul></div>`;
  }

  // validation error (if any)
  if (validated === false && validationError) {
    html += `<div class="warnings">Heads up: ${escapeHtml(validationError)}. Apply may produce unexpected results.</div>`;
  }

  // actions (skipped for color-picker case â picker has its own Apply/Discard)
  if (diff && diff.length > 0 && !isColorPicker) {
    html += `
      <div class="msg-actions">
        <button class="btn btn-primary apply-btn">Apply</button>
        <button class="btn btn-ghost discard-btn">Discard</button>
      </div>`;
  }

  el.innerHTML = html;

  const applyBtn = el.querySelector(".apply-btn");
  if (applyBtn) {
    applyBtn.addEventListener("click", () => applyDiff(narration, proposedSite, applyBtn, diff));
  }
  const discardBtn = el.querySelector(".discard-btn");
  if (discardBtn) {
    discardBtn.addEventListener("click", () => {
      el.querySelector(".msg-actions").innerHTML = '<span style="font-size:0.8rem; color:var(--slate)">Discarded.</span>';
    });
  }

  $messages.appendChild(el);
  $messages.scrollTop = $messages.scrollHeight;

  // For color-picker diffs, append the picker UI to the message and auto-preview
  // AI's pick in the iframe so the customer sees the suggestion immediately.
  if (isColorPicker) {
    openColorPicker(payload, el);
  }
}

function renderDiffRow(op) {
  const opClass = op.op;
  let pathLabel, valueLabel = "";
  switch (op.op) {
    case "set":
      pathLabel = `${op.path}`;
      valueLabel = formatValue(op.value, op.path);
      break;
    case "insert":
      pathLabel = `${op.path}${op.index !== undefined ? ` @ ${op.index}` : ""}`;
      valueLabel = formatValue(op.value, op.path);
      break;
    case "remove":
      pathLabel = op.path;
      break;
    case "move":
      pathLabel = `${op.from} â ${op.to}`;
      break;
    default:
      pathLabel = JSON.stringify(op);
  }
  return `<div class="diff-row">
    <span class="diff-op ${opClass}">${op.op}</span>
    <span class="diff-path">${escapeHtml(pathLabel)}</span>
    ${valueLabel ? `<span class="diff-value">${valueLabel}</span>` : ""}
  </div>`;
}

function formatValue(value, path) {
  if (typeof value === "string" && /^#[0-9a-fA-F]{6}$/.test(value)) {
    return `<span class="diff-color" style="background:${value}"></span>${value}`;
  }
  if (typeof value === "string") {
    return escapeHtml(value.length > 60 ? value.slice(0, 57) + "..." : value);
  }
  if (typeof value === "number" || typeof value === "boolean") {
    return String(value);
  }
  if (value && typeof value === "object" && value.type) {
    return `${value.type}`;
  }
  if (Array.isArray(value)) {
    return `[${value.length} items]`;
  }
  return "{...}";
}

/* ---------- apply diff ---------- */

function applyDiff(narration, proposedSite, btn, diffOps) {
  const actions = btn.parentElement;

  // B12: filter out no-op SET ops where the new value already matches the
  // current site state. These produce theatrical Apply clicks that don't
  // visibly change anything, and they pollute history.
  const meaningfulOps = (diffOps || []).filter((op) => {
    if (op.op !== "set") return true; // pass-through non-SET ops
    const current = readSitePath(currentSite, op.path);
    return op.value !== current;
  });

  // If everything was a no-op, don't pretend we changed anything.
  if (meaningfulOps.length === 0) {
    actions.innerHTML = `<span style="font-size:0.8rem; color:var(--slate)">No change needed â values already match.</span>`;
    return;
  }

  // Push to history (only meaningful changes go in)
  history.unshift({
    siteJson: structuredClone(proposedSite),
    narration,
    timestamp: Date.now()
  });
  currentSite = structuredClone(proposedSite);

  // Apply visual changes to iframe in-place where possible
  patchIframePreview(currentSite);

  // Persist the meaningful diff ops to localStorage so refresh-replay restores them
  pushDiffOps(meaningfulOps);

  // A5: pulse-highlight every DOM element affected by these ops, and count them
  // so the chat tells the truth about scope ("4 elements changed", not just "Applied").
  let affectedCount = 0;
  const doc = $iframe.contentDocument;
  if (doc) {
    const affected = new Set();
    meaningfulOps.forEach((op) => {
      findElementsAffectedByOp(doc, op).forEach((el) => affected.add(el));
    });
    pulseAffectedElements(affected);
    affectedCount = affected.size;
  }

  const countSuffix = affectedCount > 1 ? ` Â· ${affectedCount} elements changed` : "";
  actions.innerHTML = `<span style="font-size:0.8rem; color:var(--green)">â Applied${countSuffix}</span>`;

  renderHistory();
  flashSaveStatus(`Applied Â· ${narration.slice(0, 40)}${narration.length > 40 ? "..." : ""}`);
}

/* ---------- color picker (Step 2.5a) ---------- */
// AI is unreliable at exact color matching ("hot pink" -> burgundy was the
// motivating failure). Instead of asking the AI to nail the shade, we let it
// pick a starting suggestion and let the customer point at the exact swatch
// they want. Click-to-preview only â Apply commits the single history entry,
// Discard reverts the iframe, new chat message auto-discards.

let activeColorPicker = null;

function isColorPickerDiff(diff) {
  if (!Array.isArray(diff) || diff.length !== 1) return false;
  const op = diff[0];
  return op
    && op.op === "set"
    && typeof op.path === "string"
    && op.path.startsWith("brand.colors.")
    && typeof op.value === "string"
    && /^#[0-9A-Fa-f]{6}$/.test(op.value);
}

function openColorPicker(payload, msgEl) {

      <div class="cp-row-label">Or pick from</div>
      ${fullGrid.map((family) => `
        <div class="cp-grid-family">
          ${family.map((h) => swatchHTML(h, "cp-swatch-small", false)).join("")}
        </div>`).join("")}
    </div>
    <div class="cp-row">
      <div class="cp-row-label">Or paste a hex</div>
      <input type="text" class="cp-hex-input" placeholder="#XXXXXX" maxlength="7" />
    </div>
    <div class="cp-row">
      <div class="cp-current">
        <span>Currently previewing:</span>
        <span class="cp-current-swatch" style="background: ${aiHex}"></span>
        <span class="cp-current-hex">${aiHex}</span>
      </div>
    </div>
    <div class="cp-actions">
      <button type="button" class="btn btn-primary cp-apply-btn">Apply</button>
      <button type="button" class="btn btn-ghost cp-discard-btn">Discard</button>
    </div>
  `;

  msgEl.appendChild(wrap);

  const state = { wrap, msgEl, path, narration, originalHex, previewHex: aiHex };

  // Auto-preview AI's pick on open so the customer sees what they're starting from.
  applyColorToIframe(path, aiHex);

  // Wire swatch clicks
  wrap.querySelectorAll(".cp-swatch").forEach((sw) => {
    sw.addEventListener("click", (e) => {
      e.preventDefault();
      const hex = (sw.dataset.hex || "").toUpperCase();
      if (/^#[0-9A-Fa-f]{6}$/.test(hex)) selectColorInPicker(state, hex);
    });
  });

  // Wire hex input â preview as soon as the typed value is a valid 6-char hex
  const hexInput = wrap.querySelector(".cp-hex-input");
  hexInput.addEventListener("input", () => {
    let v = hexInput.value.trim();
    if (v && !v.startsWith("#")) v = "#" + v;
    if (/^#[0-9A-Fa-f]{6}$/.test(v)) {
      hexInput.classList.remove("invalid");
      selectColorInPicker(state, v.toUpperCase());
    } else if (v.length > 1) {
      hexInput.classList.add("invalid");
    } else {
      hexInput.classList.remove("invalid");
    }
  });

  wrap.querySelector(".cp-apply-btn").addEventListener("click", () => commitColorPicker(state));
  wrap.querySelector(".cp-discard-btn").addEventListener("click", () => discardColorPicker(state));

  activeColorPicker = state;
  $messages.scrollTop = $messages.scrollHeight;
}

function selectColorInPicker(state, hex) {
  state.previewHex = hex;
  applyColorToIframe(state.path, hex);
  const cs = state.wrap.querySelector(".cp-current-swatch");
  const ch = state.wrap.querySelector(".cp-current-hex");
  if (cs) cs.style.background = hex;
  if (ch) ch.textContent = hex;
  state.wrap.querySelectorAll(".cp-swatch").forEach((s) => {
    s.classList.toggle("selected", (s.dataset.hex || "").toUpperCase() === hex);
  });
}

// Set the relevant CSS variable on the iframe :root. Pure preview â no diff
// stack write, no history entry. Mirror of applyOpToIframe's color branch.
function applyColorToIframe(path, hex) {
  const doc = $iframe.contentDocument;
  if (!doc) return;
  const root = doc.documentElement.style;
  if (path === "brand.colors.primary")        root.setProperty("--primary", hex);
  else if (path === "brand.colors.accent")    root.setProperty("--accent", hex);
  else if (path === "brand.colors.neutral_dark") root.setProperty("--neutral-dark", hex);
  else if (path === "brand.colors.neutral_light") root.setProperty("--neutral-light", hex);
}

// Apply: route through the existing applyDiff so history + persistence + the
// A5 pulse + count chip behavior all stay consistent with non-picker applies.
function commitColorPicker(state) {
  const finalOp = { op: "set", path: state.path, value: state.previewHex };
  const finalDiff = [finalOp];

  const finalSite = structuredClone(currentSite);
  setSitePath(finalSite, state.path, state.previewHex);

  // applyDiff replaces the parent of the button with "â Applied". Give it a
  // throwaway button host so it doesn't blow away the picker container.
  const host = document.createElement("div");
  host.style.display = "none";
  const tempBtn = document.createElement("button");
  host.appendChild(tempBtn);
  state.wrap.appendChild(host);

  applyDiff(state.narration, finalSite, tempBtn, finalDiff);

  // Replace the picker UI with a compact confirmation row.
  const before = state.wrap.parentElement;
  state.wrap.innerHTML = `<div class="cp-collapsed">â Applied <span class="cp-collapsed-swatch" style="background: ${state.previewHex}"></span> ${state.previewHex}</div>`;
  if (activeColorPicker === state) activeColorPicker = null;
  if (before) before.scrollTop = before.scrollHeight;
  $messages.scrollTop = $messages.scrollHeight;
}

function discardColorPicker(state) {
  applyColorToIframe(state.path, state.originalHex);
  state.wrap.innerHTML = `<div class="cp-discarded">Discarded.</div>`;
  if (activeColorPicker === state) activeColorPicker = null;
}

// Generate 5 similar swatches by walking lightness up and down around AI's pick.
// Saturation and hue stay fixed â gives the customer "same color, lighter/darker"
// rather than wandering into adjacent hues.
function generateSimilarShades(hex) {
  const hsl = hexToHsl(hex);
  const offsets = [-22, -11, 11, 22, 33];
  return offsets.map((delta) => {
    const l = Math.max(8, Math.min(94, hsl.l + delta));
    return hslToHex(hsl.h, hsl.s, l);
  });
}

// 9 hue families x 6 lightness stops. Familiar Tailwind-style ladder.
const STANDARD_PALETTE = [
  ["#FFF1F2", "#FECDD3", "#FB7185", "#E11D48", "#9F1239", "#4C0519"], // rose
  ["#FEF2F2", "#FECACA", "#F87171", "#DC2626", "#991B1B", "#450A0A"], // red
  ["#FFF7ED", "#FED7AA", "#FB923C", "#EA580C", "#9A3412", "#431407"], // orange
  ["#FFFBEB", "#FDE68A", "#FBBF24", "#D97706", "#92400E", "#451A03"], // amber
  ["#F0FDF4", "#BBF7D0", "#4ADE80", "#16A34A", "#166534", "#052E16"], // green
  ["#F0FDFA", "#99F6E4", "#2DD4BF", "#0D9488", "#115E59", "#042F2E"], // teal
  ["#EFF6FF", "#BFDBFE", "#60A5FA", "#2563EB", "#1E3A8A", "#172554"], // blue
  ["#FAF5FF", "#E9D5FF", "#C084FC", "#9333EA", "#6B21A8", "#3B0764"], // purple
  ["#F8FAFC", "#E2E8F0", "#94A3B8", "#475569", "#1E293B", "#020617"], // neutral
];

function hexToHsl(hex) {
  hex = hex.replace("#", "");
  const r = parseInt(hex.slice(0, 2), 16) / 255;
  const g = parseInt(hex.slice(2, 4), 16) / 255;
  const b = parseInt(hex.slice(4, 6), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h = 0, s = 0;
  const l = (max + min) / 2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)); break;
      case g: h = ((b - r) / d + 2); break;
      case b: h = ((r - g) / d + 4); break;
    }
    h *= 60;
  }
  return { h, s: s * 100, l: l * 100 };
}

function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
  const m = l - c / 2;
  let r = 0, g = 0, b = 0;
  if (h < 60)       { r = c; g = x; }
  else if (h < 120) { r = x; g = c; }
  else if (h < 180) {        g = c; b = x; }
  else if (h < 240) {        g = x; b = c; }
  else if (h < 300) { r = x;        b = c; }
  else              { r = c;        b = x; }
  const toHex = (v) => Math.round((v + m) * 255).toString(16).padStart(2, "0").toUpperCase();
  return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
}

// Read the value at a dot/bracket path inside the site JSON. Mirror of
// setSitePath. Returns undefined if the path doesn't resolve.
function readSitePath(obj, path) {
  const re = /([^.[\]]+)|\[(\d+)\]/g;
  const tokens = [];
  let m;
  while ((m = re.exec(path)) !== null) {
    if (m[1]) tokens.push({ key: m[1] });
    else if (m[2] !== undefined) tokens.push({ idx: parseInt(m[2], 10) });
  }
  let cur = obj;
  for (const t of tokens) {
    if (cur === undefined || cur === null) return undefined;
    cur = ("key" in t) ? cur[t.key] : cur[t.idx];
  }
  return cur;
}

// Given a diff op, return the DOM elements inside the iframe whose visible state
// reflects the schema field at that path. Powers the A5 pulse + count display.
// Mirrors the selector logic in applyOpToIframe â keep these two functions in sync.
function findElementsAffectedByOp(doc, op) {
  if (op.op !== "set") return [];
  const path = op.path;

  if (path === "brand.colors.primary") {
    return Array.from(doc.querySelectorAll(".btn-primary, .hero-cta, .nav-cta, .cta-btn"));
  }
  if (path === "brand.colors.accent") {
    return Array.from(doc.querySelectorAll("[class*='accent']"));
  }
  if (path === "business.name") {
    return Array.from(doc.querySelectorAll(".brand-logo, .footer-brand"));
  }
  if (path === "business.contact.phone") {
    return Array.from(doc.querySelectorAll(".nav-cta, .hero-cta, .cta-btn, .footer-link[href^='tel:']"));
  }
  if (path === "business.contact.address") {
    return Array.from(doc.querySelectorAll(".footer-address, .footer-link.footer-address"));
  }
  if (path === "business.tagline") {
    return Array.from(doc.querySelectorAll(".footer-tagline"));
  }

  // sections[N].props.<field> â single element inside the tagged section
  const sectionMatch = path.match(/^sections\[(\d+)\]\.props\.([\w_]+)$/);
  if (sectionMatch) {
    const idx = parseInt(sectionMatch[1], 10);
    const prop = sectionMatch[2];
    const section = doc.querySelector('[data-press-section="' + idx + '"]');
    if (!section) return [];
    if (prop === "headline")    return [section.querySelector("h1")].filter(Boolean);
    if (prop === "subheadline") return [section.querySelector(".lead.hero-sub, .hero-sub, .lead")].filter(Boolean);
    if (prop === "heading")     return [section.querySelector("h2")].filter(Boolean);
    if (prop === "subheading")  return [section.querySelector(".cta-sub, .lead.cta-sub")].filter(Boolean);
    if (prop === "cta_label")   return Array.from(section.querySelectorAll(".btn, .hero-cta, .cta-btn, .nav-cta"));
    if (prop === "cta_href")    return Array.from(section.querySelectorAll("a.btn, a.hero-cta, a.cta-btn, a.nav-cta"));
    return [];
  }

  // Testimonials: sections[N].props.testimonials[M].<field>
  const testMatch = path.match(/^sections\[(\d+)\]\.props\.testimonials\[(\d+)\]\.([\w_]+)$/);
  if (testMatch) {
    const sidx = parseInt(testMatch[1], 10);
    const tidx = parseInt(testMatch[2], 10);
    const section = doc.querySelector('[data-press-section="' + sidx + '"]');
    if (!section) return [];
    const card = section.querySelectorAll(".testimonial-card")[tidx];
    return card ? [card] : [];
  }

  // Top-level services[N].<field>
  const serviceMatch = path.match(/^services\[(\d+)\]\.([\w_]+)$/);
  if (serviceMatch) {
    const idx = parseInt(serviceMatch[1], 10);
    const card = doc.querySelectorAll(".service-card")[idx];
    return card ? [card] : [];
  }

  return [];
}

// Add a brief amber pulse outline to each element so the customer SEES exactly
// what changed. Auto-clears after the animation finishes.
function pulseAffectedElements(set) {
  set.forEach((el) => {
    el.classList.remove("press-pulse-affected");
    // Force reflow so re-adding the class restarts the animation
    void el.offsetWidth;
    el.classList.add("press-pulse-affected");
    setTimeout(() => el.classList.remove("press-pulse-affected"), 1300);
  });
}

function patchIframePreview(site) {
  // For visual changes that don't require a full re-render, mutate the
  // iframe DOM directly. Color and text changes work this way today;
  // more complex changes (added section, reordered) require a full
  // server-side re-render which V1 mocks by reloading the iframe.
  try {
    const doc = $iframe.contentDocument;
    if (!doc) return;
    // Update brand colors
    const root = doc.documentElement.style;
    root.setProperty("--primary", site.brand.colors.primary);
    if (site.brand.colors.accent) root.setProperty("--accent", site.brand.colors.accent);
    if (site.brand.colors.neutral_dark) root.setProperty("--neutral-dark", site.brand.colors.neutral_dark);
    if (site.brand.colors.neutral_light) root.setProperty("--neutral-light", site.brand.colors.neutral_light);

    // Update hero headline + subheadline if present
    const heroSection = site.sections.find(s => s.type === "hero");
    if (heroSection) {
      const h1 = doc.querySelector(".hero h1");
      if (h1 && h1.textContent !== heroSection.props.headline) {
        h1.textContent = heroSection.props.headline;
      }
      const sub = doc.querySelector(".hero .lead.hero-sub");
      if (sub && heroSection.props.subheadline && sub.textContent !== heroSection.props.subheadline) {
        sub.textContent = heroSection.props.subheadline;
      }
    }
    // Update services grid layout
    const servicesGrid = site.sections.find(s => s.type === "services_grid");
    if (servicesGrid?.props.layout) {
      const grid = doc.querySelector(".services-grid");
      if (grid) {
        grid.classList.remove("grid-2", "grid-3", "grid-4");
        grid.classList.add(servicesGrid.props.layout);
      }
    }
  } catch (err) {
    // Iframe may be from different origin â we can't patch it. That's OK
    // for V1; the Apply still updates state. In production we'd trigger
    // a full server-side re-render and reload the iframe URL.
    console.warn("Iframe patch failed (likely cross-origin); state updated only.", err);
  }
}

/* ---------- history ---------- */

function renderHistory() {
  const rows = history.map((entry, i) => {
    const ago = relativeTime(entry.timestamp);
    const klass = i === 0 ? "history-row current" : entry.isLaunch ? "history-row launch" : "history-row";
    const launchTag = entry.isLaunch ? '<strong style="color: var(--primary)">â </strong>' : "";
    return `
      <div class="${klass}" data-idx="${i}">
        <span class="history-dot"></span>
        <div class="history-meta">
          <div class="history-narration">${launchTag}${escapeHtml(entry.narration)}</div>
          <div class="history-time">${ago}</div>
        </div>
        <div class="history-actions">
          <button class="btn btn-ghost preview-history-btn" data-idx="${i}">Preview</button>
          <button class="btn btn-primary restore-btn" data-idx="${i}">Restore</button>
        </div>
      </div>`;
  }).join("");
  $historyTab.innerHTML = rows;

  $historyTab.querySelectorAll(".restore-btn").forEach(btn => {
    btn.addEventListener("click", () => restoreVersion(parseInt(btn.dataset.idx)));
  });
  $historyTab.querySelectorAll(".preview-history-btn").forEach(btn => {
    btn.addEventListener("click", () => previewVersion(parseInt(btn.dataset.idx)));
  });
}

function restoreVersion(idx) {
  const entry = history[idx];
  if (!entry) return;
  const restoredSite = structuredClone(entry.siteJson);
  history.unshift({
    siteJson: restoredSite,
    narration: `Restored: ${entry.narration}`,
    timestamp: Date.now()
  });
  currentSite = restoredSite;
  patchIframePreview(currentSite);
  renderHistory();
  flashSaveStatus("Restored");
  // Switch to the preview tab so the user sees the result
  switchTab("preview");
}

function previewVersion(idx) {
  // V1: just patch iframe with this version (without committing to history).
  // In production: render to a temp preview URL and open it in a new pane.
  const entry = history[idx];
  if (!entry) return;
  patchIframePreview(entry.siteJson);
  switchTab("preview");
  flashSaveStatus(`Previewing: ${entry.narration.slice(0, 30)}...`);
  // Restore current state after 5 seconds so they don't lose the live view
  setTimeout(() => {
    patchIframePreview(currentSite);
    updateSaveStatus(); // re-derive honest topbar state from localStorage
  }, 5000);
}
